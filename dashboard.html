<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&family=Amiri&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="logo/Qfavicon.png">
    <title>قـافـيـةAI</title>
    <link rel="stylesheet" href="dashstyle.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo-box">
            <a href="index.html">
                <img src="logo/QafiyaAI.png" alt="قـافـيـةAI Logo">
            </a>
        </div>

        <button class="side-tab active" data-tab="generator">
            <svg viewBox="0 0 24 24">
                <path d="M12 3v4M12 17v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M3 12h4M17 12h4M4.2 19.8l2.8-2.8M17 7l2.8-2.8"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <span>المولّد الذكي</span>
        </button>

        <button class="side-tab" data-tab="myPoems">
            <svg viewBox="0 0 24 24">
                <path d="M4 4h12v16H4zM16 4l4 4v12H8"/>
            </svg>
            <span>قصائدي</span>
        </button>

        <button class="side-tab" data-tab="favorites">
            <svg viewBox="0 0 24 24">
                <path d="M12 21s-6-4.35-9-7.5C-1 8 3 3 7.5 5.5 9 6.3 10.5 8 12 9.5c1.5-1.5 3-3.2 4.5-4C21 3 25 8 21 13.5 18 16.65 12 21 12 21z"/>
            </svg>
            <span>المفضلة</span>
        </button>

        <button class="side-tab" data-tab="profile">
            <svg viewBox="0 0 24 24">
                <path d="M12 12c2.7 0 5-2.3 5-5S14.7 2 12 2 7 4.3 7 7s2.3 5 5 5zm0 2c-4 0-8 2-8 5v3h16v-3c0-3-4-5-8-5z"/>
            </svg>
            <span>البروفايل</span>
        </button>


        <button id="logoutBtn" class="logout">تسجيل الخروج</button>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Generator -->
        <div class="tab-pane active" id="generator">

            <div class="generator-header">
                <img src="logo/QafiyaAI.png" alt="قـافـيـةAI Logo">
                <h2>مولد القصائد بالذكاء الاصطناعي</h2>
            </div>
            <div class="generator-layout">

                <!-- 🧠 Sidebar المحادثات -->
                <div class="chat-sidebar">
                    <h3>المحادثات</h3>

                    <div id="chatList" class="chat-list">
                        <!-- محادثات رح تنضاف هون -->
                    </div>

                    <button id="newChatBtn" class="new-chat">+ محادثة جديدة</button>
                </div>

                <!-- 💬 الشات -->
                <div class="chat-container">

                    <div class="chat-box">

                        <div class="output" id="output"></div>

                        <div class="input-area">
                            <textarea id="prompt" placeholder="اكتب فكرة القصيدة..."></textarea>

                            <button id="sendBtn" class="send-btn">
                                <svg viewBox="0 0 24 24">
                                    <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
                                </svg>
                            </button>
                        </div>

                    </div>

                </div>

            </div>
            
        </div>

        <!-- My Poems -->
        <div class="tab-pane" id="myPoems">

            <h2 class="section-title">قصائدي</h2>

            <div class="poems-grid" id="myPoemsGrid"></div>

            <p class="empty-state" id="emptyMyPoems">
                لم تقم بإنشاء أي قصيدة بعد
            </p>

        </div>

        <!-- Favorites -->
        <div class="tab-pane" id="favorites">

            <span class="fav-icon active" onclick="toggleFavorite(1)">
                <svg viewBox="0 0 24 24">
                    <path d="M12 21s-6-4.35-9-7.5C-1 8 3 3 7.5 5.5 9 6.3 10.5 8 12 9.5c1.5-1.5 3-3.2 4.5-4C21 3 25 8 21 13.5 18 16.65 12 21 12 21z"/>
                </svg>
            </span>

            <div class="poems-grid" id="favoritesGrid"></div>

            <p class="empty-state" id="emptyFavorites">
                لا يوجد قصائد مفضلة بعد 
            </p>

        </div>

        <!-- Profile -->
        <div class="tab-pane" id="profile">
            <img src="logo/QafiyaAI.png" alt="قـافـيـةAI Logo">

            <div class="profile-container">

                <div class="profile-card">

                    <div class="profile-header">
                        <div class="avatar">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 12c2.7 0 5-2.3 5-5S14.7 2 12 2 7 4.3 7 7s2.3 5 5 5zM4 21c0-3 4-5 8-5s8 2 8 5"/>
                            </svg>
                        </div>

                        <h3 id="userName">اسم المستخدم</h3>
                        <p id="userEmail"></p>

                    </div>

                    <div class="profile-stats">
                        <div>
                            <h4>12</h4>
                            <p>قصيدة</p>
                        </div>
                        <div>
                            <h4>5</h4>
                            <p>مفضلة</p>
                        </div>
                    </div>

                    <button class="edit-btn">تعديل البيانات</button>

                </div>

            </div>
            
        </div>

    </div>

</div>

<script type="module" src="scripts/dashboard.js"></script>
</body>
</html>
